<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning, My Lovely</title>
    <style>
        /* Menggunakan sistem warna dasar universal agar dijamin muncul */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: sans-serif;
            /* Gradasi senja pink, ungu muda, ke biru pastel */
            background-color: #ffe6e6;
            background-image: linear-gradient(135deg, #ffe6e6 0%, #f3d5ff 50%, #d8e5ff 100%);
            position: relative;
        }

        /* Kotak Pesan Transparan Romantis */
        .card {
            text-align: center;
            padding: 40px;
            max-width: 400px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        h1 {
            font-size: 26px;
            color: #2d3748;
            margin: 0 0 10px 0;
        }

        h2 {
            font-size: 24px;
            color: #ec4899;
            margin: 0 0 20px 0;
        }

        p {
            font-size: 18px;
            color: #4a5568;
            font-style: italic;
            margin: 0 0 30px 0;
        }

        /* YouTube Video Container */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            margin: 20px 0;
            border-radius: 12px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        /* Desain Tombol */
        .btn {
            background: #ec4899;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* Efek Balon Hati Naik */
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .heart {
            position: absolute;
            color: #ff4757;
            font-size: 24px;
            animation: floatUp 3.5s linear forwards;
            pointer-events: none;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <!-- Konten Box -->
    <div class="card">
        <div class="icon">✨🌸</div>
        <h1>Hello, Good Morning...</h1>
        <h2>My Lovely Hubby Honey Bunny Ihsan ❤️</h2>
        <p>"Hope you have a lovely day today! I LOVE YOUUUUUU ❤️❤️"</p>
        
        <!-- YouTube Video Player -->
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/xW6iEugZy_E" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <button onclick="startSurprise()" class="btn">Click Me! ✨</button>
    </div>

    <script>
        function startSurprise() {
            // Memunculkan Efek Hujan Hati
            for (var i = 0; i < 30; i++) {
                setTimeout(function() {
                    var heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.innerHTML = '❤️';
                    
                    heart.style.left = (Math.random() * 100) + 'vw';
                    heart.style.fontSize = (Math.random() * 15 + 20) + 'px';
                    heart.style.animationDuration = (Math.random() * 1.5 + 2.5) + 's';
                    
                    document.body.appendChild(heart);

                    setTimeout(function() {
                        heart.remove();
                    }, 4000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
